<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1a365d; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  padding: 30pt 50pt 20pt 50pt;
  border-bottom: 1pt solid #2d4a77;
}
h1 { color: #ffffff; font-size: 28pt; margin: 0; font-weight: bold; }
.main {
  flex: 1; padding: 25pt 50pt;
  display: flex; flex-direction: column; justify-content: center;
}
.definition {
  background: rgba(255,255,255,0.1); padding: 25pt; margin-bottom: 25pt;
  border-left: 4pt solid #00a896;
}
.definition p { color: #e2e8f0; font-size: 18pt; margin: 0; line-height: 1.6; }
.highlight { color: #00a896; font-weight: bold; }
.features {
  display: flex; gap: 30pt;
}
.feature {
  flex: 1; background: rgba(255,255,255,0.08); padding: 20pt;
  border-radius: 8pt;
}
.feature h3 { color: #00a896; font-size: 16pt; margin: 0 0 10pt 0; }
.feature p { color: #a0aec0; font-size: 13pt; margin: 0; }
.bottom-spacer { height: 50pt; }
</style>
</head>
<body>
<div class="header">
  <h1>什么是 Superpowers？</h1>
</div>
<div class="main">
  <div class="definition">
    <p>Superpowers 是一个 <span class="highlight">AI 编码 Agent 的技能框架与方法论</span>。通过组合式的"技能"（Skills）让 AI Agent 自动遵循经过验证的开发流程。</p>
  </div>
  <div class="features">
    <div class="feature">
      <h3>测试先行</h3>
      <p>先写测试，再写代码</p>
    </div>
    <div class="feature">
      <h3>系统化流程</h3>
      <p>7 步工作流</p>
    </div>
    <div class="feature">
      <h3>证据说话</h3>
      <p>验证通过才算完成</p>
    </div>
  </div>
</div>
<div class="bottom-spacer"></div>
</body>
</html>
