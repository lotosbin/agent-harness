<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1a365d; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.top-bar { height: 8pt; background: #00a896; }
.center {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
}
h1 {
  color: #ffffff; font-size: 48pt; margin: 0 0 20pt 0;
  font-weight: bold; letter-spacing: 2pt;
}
h2 {
  color: #00a896; font-size: 24pt; margin: 0 0 15pt 0;
  font-weight: normal;
}
.tagline { color: #a0aec0; font-size: 16pt; margin: 0 0 30pt 0; }
.stars { color: #f6e05e; font-size: 14pt; margin: 0; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="center">
  <h1>Superpowers</h1>
  <h2>让 AI 编码助手真正为你工作</h2>
  <p class="tagline">用流程弥补 AI 的不可靠</p>
  <p class="stars">118k Stars - GitHub 热榜第一</p>
</div>
</body>
</html>
